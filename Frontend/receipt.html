<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>FoodExpress Receipt</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-body p-5">

<div class="text-center mb-4">

<h2 class="text-success">

🍔 FoodExpress

</h2>

<p class="text-muted">

Payment Receipt

</p>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<h6>

Customer

</h6>

<p id="customerName">-</p>

</div>

<div class="col-md-6 text-md-end">

<h6>

Receipt No

</h6>

<p id="receiptNumber">-</p>

</div>

</div>

<div class="row">

<div class="col-md-6">

<h6>

Order ID

</h6>

<p id="orderId">-</p>

</div>

<div class="col-md-6 text-md-end">

<h6>

Payment ID

</h6>

<p id="paymentId">-</p>

</div>

</div>

<div class="row">

<div class="col-md-6">

<h6>

Payment Method

</h6>

<p id="paymentMethod">-</p>

</div>

<div class="col-md-6 text-md-end">

<h6>

Payment Date

</h6>

<p id="paymentDate">-</p>

</div>

</div> <hr>

<h5 class="mb-3">
    Delivery Address
</h5>

<div class="card bg-light border-0 mb-4">
    <div class="card-body">

        <h6 id="customerFullName">-</h6>

        <p class="mb-1" id="customerAddress">
            -
        </p>

        <p class="mb-1">
            <strong>City:</strong>
            <span id="customerCity">-</span>
        </p>

        <p class="mb-1">
            <strong>State:</strong>
            <span id="customerState">-</span>
        </p>

        <p class="mb-1">
            <strong>Pincode:</strong>
            <span id="customerPincode">-</span>
        </p>

        <p class="mb-0">
            <strong>Phone:</strong>
            <span id="customerPhone">-</span>
        </p>

    </div>
</div>

<hr>

<h5>

Ordered Items

</h5>

<div id="receiptItems">

</div>

<hr>

<div class="d-flex justify-content-between">

<h5>

Subtotal

</h5>

<h5 id="subtotal">

₹0

</h5>

</div>

<div class="d-flex justify-content-between">

<h5>

Delivery Fee

</h5>

<h5>

₹40

</h5>

</div>

<hr>

<div class="d-flex justify-content-between">

<h3>

Grand Total

</h3>

<h3
class="text-success"
id="grandTotal">

₹0

</h3>

</div>

<hr>

<div class="text-center">

<button

class="btn btn-success"

onclick="window.print()">

<i class="bi bi-printer"></i>

Print Receipt

</button>

<a

href="orders.html"

class="btn btn-primary">

My Orders

</a>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="js/api.js"></script>

<script src="js/auth.js"></script>

<script src="js/receipt.js"></script>

</body>

</html>
