 <!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | FoodExpress</title>

    <link rel="icon" href="images/placeholder-food.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">

</head>

<body>

<div id="fe-navbar-placeholder"></div>

<main class="checkout-page">

<div class="container py-5">

<div class="checkout-card">

<!-- ================= HEADER ================= -->

<div class="checkout-header">

<a href="menu.html" class="back-btn">

<i class="bi bi-arrow-left"></i>

</a>

<h3>Checkout</h3>

</div>


<!-- ================= STEPS ================= -->

<div class="checkout-progress">

<div class="step active" id="indicator1">

<div class="circle">

1

</div>

<p>Address</p>

</div>

<div class="progress-line"></div>

<div class="step" id="indicator2">

<div class="circle">

2

</div>

<p>Summary</p>

</div>

<div class="progress-line"></div>

<div class="step" id="indicator3">

<div class="circle">

3

</div>

<p>Payment</p>

</div>

</div>


<!-- ==================================================== -->
<!-- STEP 1 -->
<!-- ==================================================== -->

<section id="step1">

<h4 class="mb-4">

Delivery Address

</h4>

<div class="row">

<div class="col-md-6 mb-3">

<label>

Full Name

</label>

<input
type="text"
class="form-control"
id="fullName"
placeholder="Full name">

</div>

<div class="col-md-6 mb-3">

<label>

Phone Number

</label>

<input
type="text"
class="form-control"
id="phone"
placeholder="+91-88XXXXXXX">

</div>

<div class="col-md-6 mb-3">

<label>

Email

</label>

<input
type="email"
class="form-control"
id="email"
placeholder="abc@gmail.com">

</div>

<div class="col-md-6 mb-3">

<label>

Pincode

</label>

<input
type="text"
class="form-control"
id="pincode"
placeholder="XXXXXX">

</div>

<div class="col-12 mb-3">

<label>

Address

</label>

<textarea
rows="3"
class="form-control"
id="address"
placeholder="Street, Area, Landmark">

</textarea>

</div>

<div class="col-md-6 mb-3">

<label>

City

</label>

<input
type="text"
class="form-control"
id="city">

</div>

<div class="col-md-6 mb-4">

<label>

State

</label>
  <input
class="form-control"
list="stateList"
id="state"
placeholder="Select State">

<datalist id="stateList">
<option value="Andhra Pradesh">
<option value="Arunachal Pradesh">
<option value="Assam">
<option value="Bihar">
<option value="Chhattisgarh">
<option value="Delhi">
<option value="Goa">
<option value="Gujarat">
<option value="Haryana">
<option value="Himachal Pradesh">
<option value="Jharkhand">
<option value="Karnataka">
<option value="Kerala">
<option value="Madhya Pradesh">
<option value="Maharashtra">
<option value="Punjab">
<option value="Rajasthan">
<option value="Tamil Nadu">
<option value="Telangana">
<option value="Uttar Pradesh">
<option value="Uttarakhand">
<option value="West Bengal">
</datalist>
</div>

</div>

<div class="text-end">

<button
class="btn btn-success next-btn"
id="toSummary">

Continue

<i class="bi bi-arrow-right"></i>

</button>

</div>

 

<div class="delivery-box">
    

<h5>

Deliver To   

</h5>

<p id="deliveryAddress"></p>

 <button
id="useAddress"
class="btn btn-success">

Done

</button>

</div>
</section>

<!-- ==================================================== -->
<!-- STEP 2 -->
<!-- ==================================================== -->

<section id="step2" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">

    <h5 class="mb-0">
        Deliver To
    </h5>

    <button
        id="changeAddress"
        class="btn btn-sm btn-outline-success">

        Change

    </button>

</div>

<p id="deliveryAddress2"></p>
<h4 class="mb-4">

Order Summary

</h4>

<div id="checkout-summary">

<div class="summary-card">

<img
id="summaryImage"
src="images/placeholder-food.svg">

<div>

<h5 id="summaryName">

Food Name

</h5>

<p>

Quantity :
<span id="summaryQty">

1

</span>

</p>

<p>

Price :
₹<span id="summaryPrice">

0

</span>

</p>

</div>

</div>

<div id="summaryItems" class="mb-3"></div>

<hr>

<div class="price-box">

<div>

<span>

Subtotal

</span>

<span id="subtotal">

₹0

</span>

</div>

<div>

<span>

Delivery

</span>

<span>

₹40

</span>

</div>

<div>

<span>

GST

</span>

<span>

₹20

</span>

</div>

<hr>

<div class="total">

<span>

Total

</span>

<span id="grandTotal">

₹0

</span>

</div>

</div>

</div>

<div class="step-buttons">

<button
class="btn btn-outline-success"
id="backAddress">

Back

</button>

<button
class="btn btn-success"
id="toPayment">

Continue

</button>

</div>

</section>


<!-- ==================================================== -->
<!-- STEP 3 -->
<!-- ==================================================== -->

<section id="step3" class="d-none">

<h4 class="mb-4">

Payment Method

</h4>

<div class="payment-list">

<label class="payment-option">

<input
type="radio"
name="payment"
value="Cash on Delivery"
checked>

Cash On Delivery

</label>

<label class="payment-option">

<input
type="radio"
name="payment"
value="UPI">

UPI Payment

</label>

<label class="payment-option">

<input
type="radio"
name="payment"
value="CARD">

Credit / Debit Card

</label>

</div>

<div class="step-buttons">

<button
class="btn btn-outline-success"
id="backSummary">

Back

</button>

<button
class="btn btn-success"
id="placeOrder">

<i class="bi bi-bag-check"></i>

Place Order

</button>

</div>

</section>

</div>

</div>

</main>

<footer class="fe-footer">

<div class="container text-center">

© 2026 FoodExpress

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/payment.js"></script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script src="js/checkout.js"></script>

</body>

</html>
