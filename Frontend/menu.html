<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | FoodExpress</title>

  <link rel="icon" href="images/placeholder-food.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

  <div id="fe-navbar-placeholder"></div>

  <main>
    <section class="fe-hero py-5">
      <div class="container">
        <h1 class="mb-2">Our Menu</h1>
        <p class="fe-hero-sub mb-0">Search, filter and find exactly what you're craving.</p>
      </div>
    </section>

    <div class="container my-5">
      <div class="row g-4">
        <!-- ============================ FILTERS ============================ -->
        <div class="col-lg-3">
          <div class="fe-card fe-filters-card p-4">
            <h6 class="mb-3"><i class="bi bi-sliders me-1"></i> Filters</h6>
            <form id="filter-form">
              <div class="mb-3">
                <label class="form-label">Search</label>
                <input type="text" class="form-control" id="filter-keyword" placeholder="Search dishes...">
              </div>
              <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" id="filter-category">
                  <option value="">All Categories</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Price Range</label>
                <div class="d-flex gap-2">
                  <input type="number" min="0" class="form-control" id="filter-min-price" placeholder="Min">
                  <input type="number" min="0" class="form-control" id="filter-max-price" placeholder="Max">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Sort By</label>
                <select class="form-select" id="filter-sort">
                  <option value="">Relevance</option>
                  <option value="price">Price: Low to High</option>
                  <option value="-price">Price: High to Low</option>
                  <option value="-createdAt">Newest First</option>
                  <option value="-rating">Top Rated</option>
                </select>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-fe-primary flex-grow-1">Apply</button>
                <button type="button" id="filter-reset" class="btn btn-fe-outline">Reset</button>
              </div>
            </form>
          </div>
        </div>

        <!-- ============================ FOOD GRID =========================== -->
        <div class="col-lg-9">
          <div class="row g-4" id="food-grid">
            <!-- Populated live from GET /api/foods via js/menu.js -->
          </div>

          <div class="fe-empty-state d-none" id="menu-empty-state">
            <i class="bi bi-emoji-frown"></i>
            <h5>No dishes match your filters</h5>
            <p>Try adjusting your search or price range.</p>
          </div>

          <nav class="mt-4">
            <ul class="pagination justify-content-center" id="menu-pagination"></ul>
          </nav>
        </div>
      </div>
    </div>
  </main>

  <!-- ============================ FOOD DETAIL MODAL ============================ -->
  <div class="modal fade" id="food-detail-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="food-detail-title">Loading...</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="food-detail-body"></div>
      </div>
    </div>
  </div>

  <footer class="fe-footer">
    <div class="container text-center small">&copy; 2026 FoodExpress. All rights reserved.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/wishlist.js"></script>
  <script src="js/menu.js"></script>
  <script>renderNavbar('menu');</script>
</body>
</html>
