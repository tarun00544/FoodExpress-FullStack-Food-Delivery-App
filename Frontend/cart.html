<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | FoodExpress</title>

  <link rel="icon" href="images/placeholder-food.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

  <div id="fe-navbar-placeholder"></div>

  <main class="container my-5">
    <h2 class="fe-section-title mb-4"><i class="bi bi-cart3 me-1"></i> Your Cart</h2>

    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cart-items-container"></div>

        <div class="fe-empty-state d-none" id="cart-empty-state">
          <i class="bi bi-cart-x"></i>
          <h5>Your cart is empty</h5>
          <p>Looks like you haven't added anything yet.</p>
          <a href="menu.html" class="btn btn-fe-primary mt-2">Browse Menu</a>
        </div>
      </div>

       <div class="col-lg-4">

    <div class="fe-card p-4" id="cart-summary">

        <h4>Order Summary</h4>

        <div class="d-flex justify-content-between">
            <span>Subtotal</span>
            <span id="cart-subtotal">₹0</span>
        </div>

        <div class="d-flex justify-content-between mt-2">
            <span>Delivery Fee</span>
            <span id="cart-delivery-fee">₹40</span>
        </div>

        <hr>

        <div class="d-flex justify-content-between fw-bold">
            <span>Total</span>
            <span id="cart-total">₹0</span>
        </div>

        <button
            id="checkoutBtn"
            class="btn btn-fe-primary w-100 mt-4">

            <i class="bi bi-bag-check"></i>
            Proceed To Checkout

        </button>

    </div>

</div>

          
      </div>
    </div>
  </main>

  <footer class="fe-footer">
    <div class="container text-center small">&copy; 2026 FoodExpress. All rights reserved.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/cart.js"></script>
  <script>renderNavbar('cart');</script>
   
</body>
</html>
