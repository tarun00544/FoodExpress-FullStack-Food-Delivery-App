<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | FoodExpress</title>

  <link rel="icon" href="images/placeholder-food.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>

  <div id="fe-navbar-placeholder"></div>

  <main class="container my-5">
    <h2 class="fe-section-title mb-4"><i class="bi bi-cart3 me-1"></i> Your Cart</h2>

    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cart-items-container"></div>

        <div class="fe-empty-state d-none" id="cart-empty-state">
          <i class="bi bi-cart-x"></i>
          <h5>Your cart is empty</h5>
          <p>Looks like you haven't added anything yet.</p>
          <a href="menu.html" class="btn btn-fe-primary mt-2">Browse Menu</a>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="fe-card fe-summary-card p-4 d-none" id="cart-summary">
          <h6 class="mb-3">Order Summary</h6>
          <div class="fe-summary-row"><span>Subtotal</span><span id="cart-subtotal">₹0.00</span></div>
          <div class="fe-summary-row"><span>Delivery Fee</span><span id="cart-delivery-fee">₹0.00</span></div>
          <div class="fe-summary-row fe-summary-total"><span>Total</span><span id="cart-total">₹0.00</span></div>

          <hr>
          <h6 class="mb-3">Delivery Details</h6>
          <div id="checkout-error" class="alert alert-danger d-none py-2 small"></div>
          <form id="checkout-form">
            <div class="mb-2">
              <label class="form-label small fw-semibold">Delivery Address</label>
              <textarea class="form-control" id="checkout-address" rows="2" required placeholder="Street, city, ZIP"></textarea>
            </div>
            <div class="mb-2">
              <label class="form-label small fw-semibold">Phone Number</label>
              <input type="tel" class="form-control" id="checkout-phone" required placeholder="+91 98765 43210">
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Payment Method</label>
              <select class="form-select" id="checkout-payment">
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Credit / Debit Card">Credit / Debit Card</option>
                <option value="UPI">UPI</option>
              </select>
            </div>
            <button type="submit" class="btn btn-fe-accent w-100"  id="placeOrder">Place Order</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="fe-footer">
    <div class="container text-center small">&copy; 2026 FoodExpress. All rights reserved.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script type="module" src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/cart.js"></script>
  <script>renderNavbar('cart');</script>
   
</body>
</html>
