<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | FoodExpress</title>

  <link rel="icon" href="images/placeholder-food.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div id="fe-navbar-placeholder"></div>

  <main>
    <div class="container fe-auth-wrapper">
      <div class="row justify-content-center w-100">
        <div class="col-lg-9">
          <div class="fe-auth-card row g-0">
            <div class="col-md-5 fe-auth-side order-md-2">
              <span class="fe-brand-dot mb-3" style="width:14px;height:14px;background:var(--fe-saffron);border-radius:50%;display:inline-block;"></span>
              <h2 class="text-white">Join FoodExpress today</h2>
              <p class="fe-auth-tagline mt-2">Create an account to save your favorite dishes, track deliveries, and check out in seconds.</p>
            </div>
            <div class="col-md-7 fe-auth-form-side order-md-1">
              <h4 class="mb-1">Create an account</h4>
              <p class="text-muted-fe small mb-4">It only takes a minute.</p>

              <div id="register-error" class="alert alert-danger d-none" role="alert"></div>

              <form id="register-form" novalidate>
                <div class="mb-3">
                  <label for="register-name" class="form-label fw-semibold">Full name</label>
                  <input type="text" class="form-control" id="register-name" placeholder="Jane Doe" required>
                </div>
                <div class="mb-3">
                  <label for="register-email" class="form-label fw-semibold">Email address</label>
                  <input type="email" class="form-control" id="register-email" placeholder="you@example.com" required>
                </div>
                <div class="row">
                  <div class="col-sm-6 mb-3">
                    <label for="register-password" class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control" id="register-password" placeholder="At least 6 characters" required minlength="6">
                  </div>
                  <div class="col-sm-6 mb-3">
                    <label for="register-confirm-password" class="form-label fw-semibold">Confirm password</label>
                    <input type="password" class="form-control" id="register-confirm-password" placeholder="Repeat password" required minlength="6">
                  </div>
                </div>
                <button type="submit" class="btn btn-fe-primary w-100 mt-2">Create Account</button>
              </form>

              <p class="text-center small mt-4 mb-0">
                Already have an account? <a href="login.html" class="text-forest fw-semibold">Log in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>renderNavbar('register');</script>
</body>
</html>
