<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | FoodExpress</title>

  <link rel="icon" href="images/placeholder-food.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

  <div id="fe-navbar-placeholder"></div>

  <main class="container my-5">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="fe-card p-4 text-center">
          <div class="fe-profile-avatar mx-auto" id="profile-avatar-initial">?</div>
          <h6 class="mt-3 mb-0" id="profile-sidebar-name">—</h6>
          <span class="badge bg-forest mt-2" id="profile-role-badge">Customer</span>
        </div>
      </div>

      <div class="col-lg-9">
        <ul class="nav nav-pills fe-profile-tabs mb-4" id="profile-tabs">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-details">Account Details</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-password">Change Password</button>
          </li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="tab-details">
            <div class="fe-card p-4">
              <div id="profile-error" class="alert alert-danger d-none"></div>
              <form id="profile-form">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="profile-name" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" id="profile-email" disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <input type="tel" class="form-control" id="profile-phone" placeholder="+91 98765 43210">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Delivery Address</label>
                    <input type="text" class="form-control" id="profile-address" placeholder="Street, city, ZIP">
                  </div>
                </div>
                <button type="submit" class="btn btn-fe-primary mt-4">Save Changes</button>
              </form>
            </div>
          </div>

          <div class="tab-pane fade" id="tab-password">
            <div class="fe-card p-4">
              <div id="password-error" class="alert alert-danger d-none"></div>
              <form id="password-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold">Current Password</label>
                  <input type="password" class="form-control" id="current-password" required>
                </div>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" class="form-control" id="new-password" required minlength="6">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm-new-password" required minlength="6">
                  </div>
                </div>
                <button type="submit" class="btn btn-fe-primary mt-4">Update Password</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="fe-footer">
    <div class="container text-center small">&copy; 2026 FoodExpress. All rights reserved.</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script  src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script>
    renderNavbar('profile');
    // Fill sidebar avatar/name from cached user
    const feUser = getUser();
    if (feUser) {
      document.getElementById('profile-avatar-initial').textContent = (feUser.name || '?').charAt(0).toUpperCase();
      document.getElementById('profile-sidebar-name').textContent = feUser.name || 'Account';
    }
  </script>
</body>
</html>
